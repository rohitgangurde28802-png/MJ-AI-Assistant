name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper
        working-directory: ./mj-native-android
        run: |
          gradle wrapper --gradle-version 8.5 --no-daemon

      - name: Build APK
        working-directory: ./mj-native-android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MJ Assistant v1.0.${{ github.run_number }}
          body: |
            ## MJ AI Assistant - Android APK
            Install this on your phone to run MJ live!
          files: mj-native-android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
